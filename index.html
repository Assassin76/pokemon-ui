<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon UI</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="menu-btn">
        <i class="ri-menu-line"></i>
    </div>

    <div class="theme-btn">
        <i class="ri-sun-line"></i>
    </div>

    <img
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg"
        class="logo"
        alt="Pokemon Logo"
    >

    <div class="search-box">
        <i class="ri-search-line search-icon"></i>
        <input type="text" placeholder="Search for a Pokémon...">
    </div>

    <div class="filter-box">
        Filter by types (1)
        <i class="ri-arrow-down-s-line"></i>
    </div>

    <div class="filter-icon">
        <i class="ri-filter-3-line"></i>
    </div>

    <div class="cards">

        <div class="card grass">
            <span class="number">#0908</span>

            <div class="heart">
                <i class="ri-heart-line"></i>
            </div>

            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/908.png">

            <h2>Meowscarada</h2>

            <div class="type">GRASS</div>

            <div class="arrow">
                <i class="ri-arrow-right-line"></i>
            </div>
        </div>

        <div class="card steel">
            <span class="number">#0624</span>

            <div class="heart">
                <i class="ri-heart-line"></i>
            </div>

            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/624.png">

            <h2>Pawniard</h2>

            <div class="type">DARK / STEEL</div>

            <div class="arrow">
                <i class="ri-arrow-right-line"></i>
            </div>
        </div>

        <div class="card fire">
            <span class="number">#0229</span>

            <div class="heart">
                <i class="ri-heart-line"></i>
            </div>

            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/229.png">

            <h2>Houndoom</h2>

            <div class="type">DARK / FIRE</div>

            <div class="arrow">
                <i class="ri-arrow-right-line"></i>
            </div>
        </div>

        <div class="card water">
            <span class="number">#0686</span>

            <div class="heart">
                <i class="ri-heart-line"></i>
            </div>

            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/686.png">

            <h2>Inkay</h2>

            <div class="type">DARK / PSYCHIC</div>

            <div class="arrow">
                <i class="ri-arrow-right-line"></i>
            </div>
        </div>

    </div>

    <div class="features">

        <div class="feature">
            <i class="ri-compass-3-line"></i>
            <h4>Explore</h4>
            <p>Discover Pokémon</p>
        </div>

        <div class="feature">
            <i class="ri-leaf-line"></i>
            <h4>Filter</h4>
            <p>Find by type</p>
        </div>

        <div class="feature">
            <i class="ri-star-line"></i>
            <h4>Collection</h4>
            <p>Save favorites</p>
        </div>

        <div class="feature">
            <i class="ri-bar-chart-line"></i>
            <h4>Stats</h4>
            <p>View details</p>
        </div>

    </div>

    <div class="footer">
        © 2024 Pokémon. All rights reserved.
    </div>

</div>

</body>
</html>
